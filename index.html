  <style>
    html, body, #root { margin: 0; height: 100%; }
    body { background: var(--bg); font-family: "Inter", "Noto Sans TC", "PingFang TC", sans-serif; }
    /* checkbox / 表單元件 accent 對齊主色 */
    input[type="checkbox"], input[type="radio"] { accent-color: var(--accent); }
    input[type="date"] { font-family: inherit; }
    .cust-name:hover { color: var(--accent-text); text-decoration: underline; text-underline-offset: 2px; }

    /* 客戶管理 v2：整列可點、操作鈕 hover 才顯示、浮動批次列 */
    .cust-row { cursor: pointer; }
    .cust-row .row-actions { opacity: 0; transition: opacity 120ms ease; }
    .cust-row:hover .row-actions, .cust-row.sel .row-actions { opacity: 1; }
    .tbl th { white-space: nowrap; }
    .batch-btn {
      display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 11px;
      border: none; border-radius: 999px; cursor: pointer;
      background: transparent; color: var(--text-invert);
      font: 500 12.5px/1 var(--font-sans, inherit); font-family: inherit;
      transition: background 120ms ease;
    }
    .batch-btn:hover { background: rgba(255,255,255,0.14); }
    /* 進場動畫只動 transform、不動 opacity（基底樣式即為可見端），並以 reduced-motion 把關 */
    @keyframes batchIn { from { transform: translate(-50%, 6px); } to { transform: translate(-50%, 0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <template id="__bundler_thumbnail" data-bg-color="#8A5A2B">

      <rect x="556" y="470" width="160" height="14" rx="7" fill="#c9b89e"/>
    </svg>

</body>
